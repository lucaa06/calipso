<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Pagina non trovata | Calipso</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/x-icon"  href="/favicon.ico">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--bg:#F4EFE6;--ink:#0D0A08;--muted:#5C5248;--red:#A21A2D;--line:rgba(13,10,8,0.1);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--ink);font-family:'Cormorant Garamond',serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.num{font-family:'Bebas Neue',sans-serif;font-size:clamp(10rem,25vw,22rem);line-height:.85;color:transparent;-webkit-text-stroke:1.5px rgba(13,10,8,.12);margin-bottom:1rem;user-select:none;}
h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:clamp(1.8rem,4vw,3.5rem);color:var(--ink);margin-bottom:1.5rem;}
p{font-size:1.05rem;font-weight:300;color:var(--muted);margin-bottom:3rem;line-height:1.7;max-width:400px;}
.btn{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:#fff;background:var(--red);padding:1rem 2.5rem;text-decoration:none;display:inline-block;transition:background .3s;}
.btn:hover{background:#c4253a;}
.logo{position:absolute;top:2rem;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);text-decoration:none;}
.logo:hover{color:var(--red);}
</style>
</head>
<body>
<a class="logo" href="index.html">Calipso</a>
<div class="num">404</div>
<h1>Pagina non trovata.</h1>
<p>La pagina che stai cercando non esiste o è stata spostata. Torna alla home e riprova.</p>
<a class="btn" href="index.html">Torna alla Home</a>
</body>
</html>
